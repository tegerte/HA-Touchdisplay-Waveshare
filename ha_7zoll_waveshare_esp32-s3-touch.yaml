#######################################################################
#  ESPHome config for Waveshare ESP32-S3-Touch-LCD-7 (800x480)
#  Hardware: ESP32-S3, 8MB flash, octal PSRAM, 800x480 RGB display,
#            GT911 touchscreen, CH422G IO expander, backlight via expander
#
#  Hardware setup is provided by the inytar package — it sets up:
#    psram, esp32, i2c (GPIO8/9), ch422g, mipi_rgb display,
#    GT911 touchscreen (INT=GPIO4, RESET via CH422G), backlight light entity
#    "lcdbacklight", and antiburn protection script/switch.
#
#  Ported from MAtouch ESP32-S3 7" (1024x600); UI rescaled to 800x480.
#######################################################################
substitutions:
  graph_server_ip: "192.168.1.145"   # ← IP des Homeservers (Python-Bildserver Port 8765)

esphome:
  name: waveshare-esp32s3-7
  friendly_name: Waveshare_ESP32S3_7
  on_boot:
    priority: -100       # after LVGL init so widgets already exist
    then:
      - lvgl.label.update:
          id: lbl_charge_soc
          text: "SoC: --"
      # Wait until evcc_mode has received its state from HA, then sync buttons
      - wait_until:
          lambda: 'return id(evcc_mode).has_state();'
      - lvgl.label.update:
          id: lbl_charge_mode
          text: !lambda 'return "Modus: " + id(evcc_mode).state;'
      - lambda: |-
          std::string mode = id(evcc_mode).state;
          lv_obj_t *btns[] = {id(btn_mode_pv), id(btn_mode_minpv), id(btn_mode_now), id(btn_mode_off)};
          const char *modes[] = {"pv", "minpv", "now", "off"};
          for (int i = 0; i < 4; i++) {
            if (mode == modes[i]) {
              lv_obj_add_state(btns[i], LV_STATE_CHECKED);
            } else {
              lv_obj_clear_state(btns[i], LV_STATE_CHECKED);
            }
          }
          if (mode == "minpv") {
            lv_obj_add_state(id(charge_PV_Start), LV_STATE_CHECKED);
          } else {
            lv_obj_clear_state(id(charge_PV_Start), LV_STATE_CHECKED);
          }

#######################################################################
#  Hardware package (display, touch, I2C, CH422G, backlight)
#  Requires ESPHome 2025.8.0+
#######################################################################
packages:
  waveshare: github://inytar/waveshare-esp32-s3-touch-lcd-7-esphome/waveshare-esp32-s3-touch-lcd-7.yaml@main

# Override: package sets PSRAM to 120 MHz (experimental) — drop to 80 MHz
# for stability on this board.
psram:
  mode: octal
  speed: 80MHz

#######################################################################
#  Connectivity
#######################################################################
logger:
  level: DEBUG

api:
  encryption:
    key: "f96WZzgTTD2DxeZWz0VdKoo8bOM+FIxW3mRqBJvQ6nw="

ota:
  - platform: esphome
    password: "d07b6149f214b6af250accfb0517c23d"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Fallback hotspot when WiFi connection fails
  ap:
