#######################################################################
#  Time sync from Home Assistant (needed for relative time calculations)
#######################################################################
time:
  - platform: homeassistant
    id: ha_time
    on_time:
      # Update Header-Label mit aktuellem Datum/Uhrzeit jede Minute
      - seconds: 0
        then:
          - lvgl.label.update:
              id: lbl_header_main
              text: !lambda |-
                auto t = id(ha_time).now();
                if (!t.is_valid()) return std::string("KW--    -    --.--.--    -    --:--");
                return t.strftime("KW%V    -    %d.%m.%y    -    %H:%M");
    on_time_sync:
      # Initial-Update sobald Zeit von HA synchronisiert wird
      - then:
          - lvgl.label.update:
              id: lbl_header_main
              text: !lambda |-
                auto t = id(ha_time).now();
                if (!t.is_valid()) return std::string("KW--    -    --.--.--    -    --:--");
                return t.strftime("KW%V    -    %d.%m.%y    -    %H:%M");

#######################################################################
#  Online image – temperature graph fetched from home server
#######################################################################
http_request:
  verify_ssl: false

online_image:
  - url: "http://${graph_server_ip}:8765/temp_graph.jpg"
    id: temp_graph_img
    format: JPEG
    type: RGB565
    update_interval: 2min
    on_download_finished:
      - lvgl.image.update:
          id: temp_graph_widget
          src: temp_graph_img

#######################################################################
#  Home Assistant sensors
#######################################################################
sensor:
  # Raw outdoor temperature – unused directly, kept for lambda access
  - platform: homeassistant
    id: temp_aussen
    entity_id: sensor.lufttemperatur_aussen
    internal: true

  # Outdoor temperature → drives the meter needle and text label
  - platform: homeassistant
    id: outdoor_temperature
    entity_id: sensor.lufttemperatur_aussen
    on_value:
        - lvgl.indicator.update:
            id: temperature_needle
            value: !lambda return x * 10;  # needle scale is -100..400 = -10..40°C
        - lvgl.label.update:
            id: temperature_text
            text:
              format: "%.1f°C"
              args: [ 'x' ]

  # Hausbatterie SoC → bar (max 350 px) und Charge-Page Label
  - platform: homeassistant
    id: battery_soc
    entity_id: sensor.evcc_battery_soc
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_charge_soc
            text: !lambda |-
              char buf[24];
              snprintf(buf, sizeof(buf), "SoC: %d%%", (int)x);
              return std::string(buf);
        - lambda: |-
            int fill_h = (int)(x * 3.5f);   // 100% → 350px
            if (fill_h < 0) fill_h = 0;
            if (fill_h > 350) fill_h = 350;
            lv_obj_set_size(id(fill_hausbatt), 40, fill_h);
            lv_obj_set_pos(id(fill_hausbatt), 0, 350 - fill_h);
        - lvgl.label.update:
            id: lbl_bar_hausbatt
            text: !lambda |-
              char buf[8];
              snprintf(buf, sizeof(buf), "%d%%", (int)x);
              return std::string(buf);

  # Mercedes Reichweite → vertikale Bar (max 400 km → 350 px)
  # und horizontale Bars auf Charge-Page (max 400 km → 395 px)
  - platform: homeassistant
    id: mercedes_range
    entity_id: sensor.cw_mt_891_e_range_electric
    internal: true
    on_value:
      then:
        - lambda: |-
            int fill_h = (int)(x / 400.0f * 350.0f);
            if (fill_h < 0) fill_h = 0;
            if (fill_h > 350) fill_h = 350;
            lv_obj_set_size(id(fill_mercedes), 40, fill_h);
            lv_obj_set_pos(id(fill_mercedes), 0, 350 - fill_h);
            int fill_w = (int)(x / 400.0f * 395.0f);
            if (fill_w < 0) fill_w = 0;
            if (fill_w > 395) fill_w = 395;
            lv_obj_set_size(id(fill_range_plan), fill_w, 8);
            lv_obj_set_size(id(fill_range_pv), fill_w, 8);
        - lvgl.label.update:
            id: lbl_bar_mercedes
            text: !lambda |-
              char buf[10];
              snprintf(buf, sizeof(buf), "%d km", (int)x);
              return std::string(buf);

  # PV Tagesrestenergie → Info-Label
  - platform: homeassistant
    id: pv_tagesrestenergie
    entity_id: sensor.pv_verbleibende_energie_heute
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_pv_restenergie
            text: !lambda |-
              char buf[16];
              snprintf(buf, sizeof(buf), "%.1f kWh", x);
              return std::string(buf);

  # PV-Leistung → vertikale Bar (100% = 10 kW; entity reports W)
  - platform: homeassistant
    id: pv_power
    entity_id: sensor.evcc_pv_power
    internal: true
    on_value:
      then:
        - lambda: |-
            float pct = x / 100.0f;
            if (pct < 0.0f) pct = 0.0f;
            if (pct > 100.0f) pct = 100.0f;
            int fill_h = (int)(pct * 3.5f);   // 100% → 350px
            lv_obj_set_size(id(fill_pv), 40, fill_h);
            lv_obj_set_pos(id(fill_pv), 0, 350 - fill_h);
        - lvgl.label.update:
            id: lbl_bar_pv
            text: !lambda |-
              char buf[16];
              snprintf(buf, sizeof(buf), "%d W", (int)x);
              return std::string(buf);

  # EV Ladeleistung → vertikale Bar (max 11 kW → 350 px)
  # und horizontale Bars auf Charge-Page (max 11 kW → 395 px)
  - platform: homeassistant
    id: ev_charge_power
    entity_id: sensor.evcc_e_auto_laden_charge_power
    internal: true
    on_value:
      then:
        - lambda: |-
            int fill_h = (int)(x / 11.0f * 350.0f);
            if (fill_h < 0) fill_h = 0;
            if (fill_h > 350) fill_h = 350;
            lv_obj_set_size(id(fill_ev_charge), 40, fill_h);
            lv_obj_set_pos(id(fill_ev_charge), 0, 350 - fill_h);
            int fill_w = (int)(x / 11.0f * 395.0f);
            if (fill_w < 0) fill_w = 0;
            if (fill_w > 395) fill_w = 395;
            lv_obj_set_size(id(fill_charge_plan), fill_w, 8);
            lv_obj_set_size(id(fill_charge_pv), fill_w, 8);
        - lvgl.label.update:
            id: lbl_bar_ev_charge
            text: !lambda |-
              char buf[16];
              snprintf(buf, sizeof(buf), "%.1f kW", x);
              return std::string(buf);

#######################################################################
#  Home Assistant binary sensors
#######################################################################
binary_sensor:
  - platform: homeassistant
    id: evcc_ladeplan_aktiv
    entity_id: input_boolean.evcc_ladeplan_aktiv
    publish_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: charge_60perc_7
            state:
              checked: !lambda 'return x;'

#######################################################################
#  Home Assistant text sensors
#######################################################################
text_sensor:
  - platform: homeassistant
    id: ts_remote_light
    entity_id: light.remote_light
    on_value:
      then:
        - lvgl.widget.update:
            id: btn_lightbulb
            state:
              checked: !lambda return (0 == x.compare(std::string{"on"}));
              disabled: !lambda return ((0 == x.compare(std::string{"unavailable"})) or (0 == x.compare(std::string{"unknown"})));
        - lvgl.label.update:
            id: lbl_lightbulb
            text: !lambda |-
              static char buf[10];
              std::string icon;
              if (0 == x.compare(std::string{"on"})) {
                  icon = "\U000F0335";
              } else {
                  icon = "\U000F0336";
              }
              snprintf(buf, sizeof(buf), "%s", icon.c_str());
              return buf;

  - platform: homeassistant
    id: zeit_bis_sonnenuntergang
    entity_id: sensor.zeit_bis_sonnenuntergang
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_sonnenuntergang
            text: !lambda return x;

  - platform: homeassistant
    id: evcc_mode
    entity_id: select.evcc_e_auto_laden_mode
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_charge_mode
            text: !lambda 'return "Modus: " + x;'
        - lambda: |-
            std::string mode = x;
            lv_obj_t *btns[] = {id(btn_mode_pv), id(btn_mode_minpv), id(btn_mode_now), id(btn_mode_off)};
            const char *modes[] = {"pv", "minpv", "now", "off"};
            for (int i = 0; i < 4; i++) {
              if (mode == modes[i]) {
                lv_obj_add_state(btns[i], LV_STATE_CHECKED);
              } else {
                lv_obj_clear_state(btns[i], LV_STATE_CHECKED);
              }
            }
            if (mode == "minpv") {
              lv_obj_add_state(id(charge_PV_Start), LV_STATE_CHECKED);
            } else {
              lv_obj_clear_state(id(charge_PV_Start), LV_STATE_CHECKED);
            }

  - platform: homeassistant
    id: ts_daily_pv_energy
    entity_id: sensor.daily_pv_energy
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_daily_pv_energy
            text: !lambda return x + " kWh";

  - platform: homeassistant
    id: ts_autarkie
    entity_id: sensor.daily_self_suff_rate
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_autarkie
            text: !lambda return x + " %";

  - platform: homeassistant
    id: ts_solar_pct
    entity_id: sensor.evcc_stat_total_solar_percentage
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_solar_pct
            text: !lambda |-
              char buf[16];
              snprintf(buf, sizeof(buf), "%.1f %%", atof(x.c_str()));
              return std::string(buf);

  - platform: homeassistant
    id: ts_range_electric
    entity_id: sensor.cw_mt_891_e_range_electric
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_range_electric
            text: !lambda return x + " km";

  - platform: homeassistant
    id: ts_plan_end
    entity_id: sensor.cw_mt_891_e_end_of_charge
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_plan_end
            text: !lambda |-
              if (x == "unknown" || x.empty()) return std::string("-");
              struct tm tm = {};
              strptime(x.c_str(), "%Y-%m-%dT%H:%M:%S", &tm);
              time_t target = mktime(&tm);
              auto now = id(ha_time).now();
              if (!now.is_valid()) return std::string("--");
              time_t now_t = now.timestamp;
              int diff_h = (int)((target - now_t) / 3600);
              if (diff_h < 0) diff_h = 0;
              char buf[16];
              snprintf(buf, sizeof(buf), "in %dh", diff_h);
              return std::string(buf);

  - platform: homeassistant
    id: ts_plan_soc
    entity_id: sensor.evcc_e_auto_laden_effective_plan_soc
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_plan_soc
            text: !lambda return x + " %";

  - platform: homeassistant
    id: ts_departure
    entity_id: sensor.cw_mt_891_e_departure_time
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_departure
            text: !lambda 'return x == "unknown" ? "-" : x;'

  - platform: homeassistant
    id: ts_energy_cost
    entity_id: sensor.nachgeladen_energie_kosten
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_energy_cost
            text: !lambda return x + " €" + "/100km";

  - platform: homeassistant
    id: ts_sess_range
    entity_id: sensor.nachgeladene_reichweite
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_sess_range
            text: !lambda return x + " km";

  - platform: homeassistant
    id: ts_sess_price
    entity_id: sensor.evcc_e_auto_laden_session_price
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_sess_price
            text: !lambda |-
              char buf[16];
              snprintf(buf, sizeof(buf), "%.1f €", atof(x.c_str()));
              return std::string(buf);

  - platform: homeassistant
    id: ts_charged_energy
    entity_id: sensor.evcc_e_auto_laden_charged_energy
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_charged_energy
            text: !lambda |-
              char buf[16];
              snprintf(buf, sizeof(buf), "%.1f kWh", atof(x.c_str()));
              return std::string(buf);

#######################################################################
#  LVGL – UI definition (skaliert für 800x480)
#######################################################################
lvgl:
  # --- Global theme applied to every widget of each type ---
  theme:
    label:
      text_font: montserrat_18
    button:
      bg_color: 0x2F8CD8
      bg_grad_color: 0x005782
      bg_grad_dir: VER
      bg_opa: COVER
      border_color: 0x0077b3
      border_width: 1
      text_color: 0xFFFFFF
      pressed:
        bg_color: 0x006699
        bg_grad_color: 0x00334d
      checked:
        bg_color: 0x1d5f96
        bg_grad_color: 0x03324A
        text_color: 0xfff300
    buttonmatrix:
      bg_opa: TRANSP
      border_color: 0x0077b3
      border_width: 0
      text_color: 0xFFFFFF
      pad_all: 0
      items:
        bg_color: 0x2F8CD8
        bg_grad_color: 0x005782
        bg_grad_dir: VER
        bg_opa: COVER
        border_color: 0x0077b3
        border_width: 1
        text_color: 0xFFFFFF
        text_font: montserrat_18
        pressed:
          bg_color: 0x006699
          bg_grad_color: 0x00334d
        checked:
          bg_color: 0x1d5f96
          bg_grad_color: 0x03324A
          text_color: 0x005580
    switch:
      bg_color: 0xC0C0C0
      bg_grad_color: 0xb0b0b0
      bg_grad_dir: VER
      bg_opa: COVER
      checked:
        bg_color: 0x1d5f96
        bg_grad_color: 0x03324A
        bg_grad_dir: VER
        bg_opa: COVER
      knob:
        bg_color: 0xFFFFFF
        bg_grad_color: 0xC0C0C0
        bg_grad_dir: VER
        bg_opa: COVER
    slider:
      border_width: 1
      border_opa: 15%
      bg_color: 0xcccaca
      bg_opa: 15%
      indicator:
        bg_color: 0x1d5f96
        bg_grad_color: 0x03324A
        bg_grad_dir: VER
        bg_opa: COVER
      knob:
        bg_color: 0x2F8CD8
        bg_grad_color: 0x005782
        bg_grad_dir: VER
        bg_opa: COVER
        border_color: 0x0077b3
        border_width: 1
        text_color: 0xFFFFFF

  # --- Reusable style for page header bars and the bottom nav bar ---
  style_definitions:
      - id: header_footer
        bg_color: 0x252D38
        bg_grad_color: 0x1C2128
        bg_grad_dir: VER
        bg_opa: COVER
        border_opa: TRANSP
        radius: 0
        pad_all: 0
        pad_row: 0
        pad_column: 0
        border_color: 0x3A4250
        text_color: 0xCCCCCC
        width: 100%
        height: 30

  # --- Persistent overlay: bottom navigation bar (always visible) ---
  top_layer:
    widgets:
      - buttonmatrix:
          align: bottom_mid
          styles: header_footer
          pad_all: 0
          outline_width: 0
          id: top_layer
          items:
            styles: header_footer
          rows:
            - buttons:
                - id: page_prev
                  text: "Automationen"
                  on_press:
                    then:
                      lvgl.page.show: Licht
                - id: page_home
                  text: ""   # home icon
                  on_press:
                    then:
                      lvgl.page.show: main_page
                - id: page_next
                  text: "Laden"
                  on_press:
                    then:
                      lvgl.page.show: Charge

  pages:
    ###################################################################
    #  Page 1 – Hauptseite (800x480)
    #  Layout (y=30..450 nutzbar):
    #    Bars:        x=10..200 (4× w=40, gap 10)
    #    Thermometer: x=210..410, y=40..240
    #    Solar-Tab.:  x=420..790, y=35..245
    #    Graph:       x=210..790, y=255..440
    ###################################################################
    - id: main_page
      bg_color: 0x1C2128
      bg_opa: COVER
      widgets:
        - obj:
            align: TOP_MID
            styles: header_footer
            height: 34   # override (Default 30) damit montserrat_22 sauber reinpasst
            widgets:
              - label:
                  id: lbl_header_main
                  text: "KW--    -    --.--.--    -    --:--"
                  align: CENTER
                  text_align: CENTER
                  text_font: montserrat_22
                  text_color: 0xFFFFFF

        # Thermometer – Panel-Pixel sind tatsächlich breiter als hoch
        # → Width kleiner und Height größer machen, damit es rund erscheint.
        - meter:
            x: 215
            y: 40
            height: 200
            width: 190
            bg_color: 0x1C2128
            bg_opa: COVER
            border_width: 0
            border_opa: TRANSP
            text_color: 0xCCCCCC
            scales:
              - range_from: -100
                range_to: 400
                angle_range: 240
                rotation: 150
                indicators:
                  - line:
                      id: temperature_needle
                      width: 2
                      color: 0xFF0000
                      r_mod: -4
              - range_from: -10
                range_to: 40
                angle_range: 240
                rotation: 150
                ticks:
                  width: 1
                  count: 51
                  length: 8
                  color: 0x888888
                  major:
                    stride: 5
                    width: 2
                    length: 8
